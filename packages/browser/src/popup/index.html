<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LabShelf</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <span class="popup__title">CAPTURE</span>
        <span id="status" class="popup__status" data-state="idle">DISCONNECTED</span>
      </header>
      <section class="popup__body">
        <button id="capture" class="popup__btn popup__btn--primary">Save current page</button>
        <button id="open-library" class="popup__btn">Open library</button>
        <button id="sync-now" class="popup__btn" disabled>Sync now</button>
        <button id="connect" class="popup__btn">Connect to Drive</button>
      </section>
      <footer class="popup__footer">
        <small id="sync-status"></small>
        <small id="capture-source"></small>
      </footer>
      <footer class="popup__footer popup__footer--meta">
        <small id="auto-sync-meta"></small>
        <small><a id="open-options" href="#">Settings</a></small>
      </footer>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
