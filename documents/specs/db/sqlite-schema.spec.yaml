feature:
  name: SQLite Research Schema
  module: db
  description: >
    Persist papers, relationships, and structured logs in a local SQLite file.
    The adapter creates the schema on startup and keeps backward compatibility
    for older paper rows by adding missing metadata columns.

architecture:
  inputs:
    - paper rows
    - log entries
    - database file URI
  outputs:
    - sqlite tables and rows
  dependencies:
    - better-sqlite3
    - storage/fileSystemService
    - vscode workspace.fs

database:
  tables_used:
    - papers
    - authors
    - paper_authors
    - tags
    - paper_tags
    - notes
    - citations
    - chunks
    - logs
  migrations: []
  schema_notes:
    papers:
      primary_key: id
      columns:
        - id
        - title
        - authors
        - year
        - path
        - citekey
        - status
        - summary
        - journal
        - publisher
        - volume
        - issue
        - pages
        - doi
        - url
        - issn
        - language
    logs:
      primary_key: id
      columns:
        - timestamp
        - level
        - module
        - message
        - stack
        - context
    relationships:
      - paper_authors.paper_id references papers.id
      - paper_authors.author_id references authors.id
      - paper_tags.paper_id references papers.id
      - paper_tags.tag_id references tags.id
      - notes.paper_id references papers.id
  compatibility:
    - ensureColumns adds missing bibliographic columns to papers

events:
  emits: []
  listens: []

errors:
  expected_failures:
    - parent directory for the database file is missing
    - SQLite open failure
    - database operations before initialization
  handling_strategy: >
    The adapter creates the parent folder, enables WAL mode, creates missing
    tables, and then lets initialization errors surface to the caller.

ui:
  components: []

tests:
  unit:
    - initialize creates the schema on a fresh database file
    - upsertPaper persists and updates rows
    - listPapers returns normalized PaperRecord objects
    - appendLog writes JSON context into the logs table
    - legacy metadata columns are added when missing
  integration:
    - rows survive process re-open through the SQLite file

ai_notes:
  embeddings: false
  semantic_search: false