feature:
  name: SQLite Research Schema
  module: db
  description: >
    Persist papers, annotations, and structured logs in a local SQLite file.
    The adapter creates the schema on startup and keeps backward compatibility
    for older paper rows by adding missing metadata columns. SQLite is a
    rebuildable local cache only — the sources of truth are metadata.yaml
    (papers) and .research/papers/<id>/data.json (annotations, themes). The
    legacy relational tables (authors, paper_authors, tags, paper_tags, notes,
    citations, chunks) were removed; that data is no longer modelled in SQLite.

architecture:
  inputs:
    - paper rows
    - log entries
    - database file URI
  outputs:
    - sqlite tables and rows
  dependencies:
    - better-sqlite3
    - storage/fileSystemService
    - vscode workspace.fs

database:
  tables_used:
    - papers
    - annotations
    - logs
  migrations: []
  schema_notes:
    papers:
      primary_key: id
      columns:
        - id
        - title
        - authors
        - year
        - path
        - citekey
        - status
        - summary
        - journal
        - publisher
        - volume
        - issue
        - pages
        - doi
        - url
        - issn
        - language
    annotations:
      primary_key: id
      columns:
        - id
        - paperId
        - type
        - pageNumber
        - content
        - color
        - position
        - createdAt
        - updatedAt
      notes: >
        Cache table rebuilt from .research/papers/<id>/data.json by
        LibraryIndexer on startup. Not the source of truth.
    logs:
      primary_key: id
      columns:
        - timestamp
        - level
        - module
        - message
        - stack
        - context
    relationships: []
  compatibility:
    - ensureColumns adds missing bibliographic columns to papers
  removed_tables:
    description: >
      The following relational tables were removed in the refactoring and are
      no longer created or queried. Authors and tags are denormalized into the
      papers row; notes/citations/chunks features are not modelled in SQLite.
    tables:
      - authors
      - paper_authors
      - tags
      - paper_tags
      - notes
      - citations
      - chunks

events:
  emits: []
  listens: []

errors:
  expected_failures:
    - parent directory for the database file is missing
    - SQLite open failure
    - database operations before initialization
  handling_strategy: >
    The adapter creates the parent folder, enables WAL mode, creates missing
    tables, and then lets initialization errors surface to the caller.

ui:
  components: []

tests:
  unit:
    - initialize creates the schema on a fresh database file
    - upsertPaper persists and updates rows
    - listPapers returns normalized PaperRecord objects
    - appendLog writes JSON context into the logs table
    - legacy metadata columns are added when missing
  integration:
    - rows survive process re-open through the SQLite file

ai_notes:
  embeddings: false
  semantic_search: false